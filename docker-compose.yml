version: '3.8'

services:
  # Flask Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cleanflow-backend
    environment:
      FLASK_APP: wsgi.py
      FLASK_ENV: development
      DATABASE_URL: sqlite:///instance/cleanflow.db
      AT_USERNAME: ${AT_USERNAME}
      AT_API_KEY: ${AT_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    command: flask run --host=0.0.0.0
    networks:
      - cleanflow-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cleanflow-frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_APP_NAME: CleanFlow SL
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - cleanflow-network

networks:
  cleanflow-network:
    driver: bridge
